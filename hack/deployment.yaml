      labels:
        app.kubernetes.io/name: whoami2
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
        - name: whoami2
          image: traefik/whoami
          ports:
            - containerPort: 80
          securityContext:
            capabilities:
              drop:
                - ALL
